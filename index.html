<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f7f7f5" />
  <title>Checklist quân sự</title>
  <style>
    :root{--bg:#f7f7f5;--text:#171717;--muted:#777;--line:#e5e5e0;--accent:#171717}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,select{font:inherit} button{cursor:pointer}
    .app{width:min(100%,480px);min-height:100svh;margin:auto;padding:calc(28px + env(safe-area-inset-top)) 18px calc(96px + env(safe-area-inset-bottom))}
    header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:28px}
    h1{font-size:30px;letter-spacing:-1.1px;line-height:1.05;margin:0}
    header p{color:var(--muted);font-size:14px;margin:8px 0 0}
    .reset{border:1px solid var(--line);background:transparent;border-radius:12px;padding:10px 12px;color:var(--muted)}
    .summary{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 0;margin-bottom:20px}
    .summary-top{display:flex;justify-content:space-between;align-items:end}
    .summary strong{font-size:24px}.summary span{font-size:13px;color:var(--muted)}
    .track{height:4px;background:var(--line);margin-top:14px;overflow:hidden}.fill{height:100%;background:var(--accent);width:0;transition:.25s}
    .search{display:flex;border-bottom:1px solid var(--line);margin-bottom:14px}
    .search input{width:100%;border:0;background:transparent;padding:12px 2px;outline:none}
    .filters{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;margin:0 -18px 22px;padding:0 18px 4px;-webkit-overflow-scrolling:touch;touch-action:pan-x;overscroll-behavior-x:contain}.filters::-webkit-scrollbar{display:none}
    .chip{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:999px;padding:8px 12px;white-space:nowrap;font-size:13px}
    .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .list{display:grid}
    .item{display:grid;grid-template-columns:26px 1fr auto;align-items:center;gap:12px;padding:15px 0;border-bottom:1px solid var(--line)}
    .item.checked{opacity:.45}.item.checked .title{text-decoration:line-through}
    .check{appearance:none;width:21px;height:21px;border:1.5px solid #aaa;border-radius:50%;display:grid;place-content:center}
    .check:checked{background:var(--accent);border-color:var(--accent)}.check:checked:after{content:"✓";font-size:13px;color:#fff;font-weight:800}
    .title{font-size:15px;font-weight:600;line-height:1.35}.meta{font-size:11px;color:var(--muted);margin-top:3px}
    .delete{border:0;background:transparent;color:#aaa;font-size:20px;padding:4px}
    .empty{text-align:center;color:var(--muted);padding:36px 0}
    .add{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));width:min(calc(100% - 36px),444px);border:0;background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-weight:800}
    dialog{width:min(calc(100% - 36px),420px);border:0;border-radius:18px;padding:20px;background:#fff}
    dialog::backdrop{background:rgba(0,0,0,.3)} dialog h2{font-size:20px;margin:0 0 18px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px}.field{margin-bottom:14px}
    .field input,.field select{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:13px;outline:none}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
    .secondary,.primary{border:0;border-radius:12px;padding:12px;font-weight:700}.secondary{background:#efefe9}.primary{background:var(--accent);color:#fff}
  </style>
</head>
<body>
<main class="app">
  <header>
    <div><h1>Checklist<br>quân sự</h1><p>Đánh dấu những món đã chuẩn bị.</p></div>
    <button class="reset" id="resetBtn">Làm mới</button>
  </header>
  <section class="summary">
    <div class="summary-top"><strong id="percent">0%</strong><span id="count">0/0 món</span></div>
    <div class="track"><div class="fill" id="fill"></div></div>
  </section>
  <label class="search"><input id="search" placeholder="Tìm món đồ..." /></label>
  <div class="filters" id="filters"></div>
  <section class="list" id="list"></section>
  <button class="add" id="addBtn">Thêm món</button>
</main>

<dialog id="dialog">
  <form id="form">
    <h2>Thêm món mới</h2>
    <div class="field"><label for="name">Tên món</label><input id="name" required maxlength="80" placeholder="Ví dụ: Áo mưa mỏng" /></div>
    <div class="field"><label for="category">Nhóm</label><select id="category"></select></div>
    <div class="actions"><button type="button" class="secondary" id="cancel">Hủy</button><button class="primary">Thêm</button></div>
  </form>
</dialog>

<script>
(() => {
  const CATEGORIES=["Giấy tờ","Quần áo","Vệ sinh","Sức khỏe","Điện tử","Tiện ích","Đồ ăn"];
  const DEFAULT=[
    ["Thẻ sinh viên","Giấy tờ"],
    ["Tiền mặt vừa đủ","Giấy tờ"],

    ["Áo mặc buổi tối","Quần áo"],
    ["Quần dài mặc ngoài giờ","Quần áo"],
    ["Đồ ngủ kín đáo","Quần áo"],
    ["Áo khoác mỏng","Quần áo"],
    ["Vớ / tất 6–8 đôi","Quần áo"],
    ["Giày Asia","Quần áo"],
    ["Dép lào / dép đi tắm","Quần áo"],
    ["Thắt lưng dự phòng","Quần áo"],
    ["Găng tay chống nắng","Quần áo"],
    ["Ống tay chống nắng","Quần áo"],
    ["Khẩu trang","Quần áo"],
    ["Dây cột tóc","Quần áo"],

    ["Khăn mặt","Vệ sinh"],
    ["Khăn tắm","Vệ sinh"],
    ["Bàn chải đánh răng","Vệ sinh"],
    ["Kem đánh răng","Vệ sinh"],
    ["Cốc đánh răng","Vệ sinh"],
    ["Sữa tắm","Vệ sinh"],
    ["Dầu gội","Vệ sinh"],
    ["Sữa rửa mặt","Vệ sinh"],
    ["Xà bông rửa tay","Vệ sinh"],
    ["Nước giặt","Vệ sinh"],
    ["Nước xả vải","Vệ sinh"],
    ["Nước tẩy trang","Vệ sinh"],
    ["Bông tẩy trang","Vệ sinh"],
    ["Phấn phủ","Vệ sinh"],
    ["Lược","Vệ sinh"],
    ["Gương nhỏ","Vệ sinh"],
    ["Tăm chỉ nha khoa","Vệ sinh"],
    ["Bấm móng tay","Vệ sinh"],
    ["Chai xịt giày","Vệ sinh"],
    ["Xịt khử mùi chân","Vệ sinh"],

    ["Softfel xịt muỗi","Sức khỏe"],
    ["Kem chống nắng cho mặt","Sức khỏe"],
    ["Kem chống nắng body","Sức khỏe"],
    ["Băng keo cá nhân","Sức khỏe"],
    ["Salonpas","Sức khỏe"],
    ["Thuốc cá nhân đang dùng","Sức khỏe"],
    ["Dầu gió","Sức khỏe"],
    ["Thuốc giảm đau / hạ sốt","Sức khỏe"],
    ["Thuốc đau bụng","Sức khỏe"],

    ["Điện thoại","Điện tử"],
    ["Dây sạc điện thoại","Điện tử"],
    ["Củ sạc","Điện tử"],
    ["Sạc dự phòng","Điện tử"],
    ["Quạt cầm tay","Điện tử"],
    ["Máy sấy tóc","Điện tử"],
    ["Tai nghe","Điện tử"],
    ["Đăng ký gói 4G","Điện tử"],

    ["Bình nước 1–1.5L","Tiện ích"],
    ["Đầu lọc nước","Tiện ích"],
    ["Móc treo quần áo (5–10 cái)","Tiện ích"],
    ["Dây phơi đồ","Tiện ích"],
    ["Kẹp quần áo","Tiện ích"],
    ["Ổ khóa nhỏ","Tiện ích"],
    ["Túi đựng đồ bẩn","Tiện ích"],
    ["Khăn giấy khô","Tiện ích"],
    ["Khăn ướt","Tiện ích"],
    ["Áo mưa mỏng","Tiện ích"],
    ["Dù che nắng mưa","Tiện ích"],
    ["Bút viết","Tiện ích"],
    ["Sổ tay","Tiện ích"],
    ["Kim chỉ","Tiện ích"],
    ["Chăn mỏng","Tiện ích"],
    ["Gối mỏng","Tiện ích"],

    ["Bánh / đồ ăn nhẹ","Đồ ăn"]
  ];

  const KEY="qs_checklist_minimal_v4";
  const OLD_KEYS=["qs_checklist_minimal_v3","qs_checklist_minimal_v2"];
  const $=s=>document.querySelector(s);
  let active=CATEGORIES[0];
  const uid=()=>crypto.randomUUID?.() || Date.now()+"-"+Math.random();
  const defaults=()=>DEFAULT.map(x=>({id:uid(),title:x[0],category:x[1],checked:false}));
  const load=()=>{
    try {
      let raw=localStorage.getItem(KEY);
      if(!raw){ for(const key of OLD_KEYS){ raw=localStorage.getItem(key); if(raw) break; } }
      const saved=JSON.parse(raw || "null");
      if(!saved) return defaults();
      const byTitle=new Map(saved.map(x=>[x.title,x]));
      return DEFAULT.map(x=>{
        const old=byTitle.get(x[0]);
        return {id:old?.id || uid(),title:x[0],category:x[1],checked:old?.checked || false};
      }).concat(saved.filter(x=>!DEFAULT.some(d=>d[0]===x.title)));
    } catch { return defaults(); }
  };
  const save=x=>localStorage.setItem(KEY,JSON.stringify(x));
  let items=load(); save(items);

  function esc(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
  function renderFilters(){
    $("#filters").innerHTML="";
    CATEGORIES.forEach(c=>{
      const b=document.createElement("button");
      b.className="chip"+(c===active?" active":""); b.textContent=c;
      b.onclick=()=>{active=c;renderFilters();render()};
      $("#filters").appendChild(b);
    });
    $("#category").innerHTML=CATEGORIES.map(c=>`<option>${c}</option>`).join("");
  }

  function render(){
    const q=$("#search").value.trim().toLowerCase();
    const visible=items.filter(x=>x.category===active && x.title.toLowerCase().includes(q));
    const done=items.filter(x=>x.checked).length;
    const pct=items.length?Math.round(done/items.length*100):0;
    $("#percent").textContent=pct+"%"; $("#count").textContent=`${done}/${items.length} món`; $("#fill").style.width=pct+"%";
    const list=$("#list"); list.innerHTML="";
    if(!visible.length){list.innerHTML='<div class="empty">Không có món phù hợp.</div>';return}
    visible.forEach(item=>{
      const row=document.createElement("article");
      row.className="item"+(item.checked?" checked":"");
      row.innerHTML=`<input class="check" type="checkbox" ${item.checked?"checked":""}>
        <div><div class="title">${esc(item.title)}</div><div class="meta">${esc(item.category)}</div></div>
        <button class="delete" aria-label="Xóa">×</button>`;
      row.querySelector(".check").onchange=e=>{
        const found=items.find(x=>x.id===item.id);
        if(found) found.checked=e.target.checked;
        save(items); render();
      };
      row.querySelector(".delete").onclick=()=>{
        if(confirm(`Xóa “${item.title}”?`)){
          items=items.filter(x=>x.id!==item.id); save(items); render();
        }
      };
      list.appendChild(row);
    });
  }

  $("#search").oninput=render;
  $("#addBtn").onclick=()=>{$("#form").reset();$("#category").value=active;$("#dialog").showModal();setTimeout(()=>$("#name").focus(),30)};
  $("#cancel").onclick=()=>$("#dialog").close();
  $("#form").onsubmit=e=>{
    e.preventDefault();
    const title=$("#name").value.trim(); if(!title)return;
    items.push({id:uid(),title,category:$("#category").value,checked:false});
    save(items); $("#dialog").close(); render();
  };
  $("#resetBtn").onclick=()=>{
    if(confirm("Khôi phục danh sách mặc định?")){
      items=defaults(); save(items); active=CATEGORIES[0]; renderFilters(); render();
    }
  };

  renderFilters(); render();
})();
</script>
</body>
</html>
